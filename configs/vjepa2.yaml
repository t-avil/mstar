model: "vjepa2"
max_seq_len: 8192

# Default checkpoint is facebook/vjepa2-vitl-fpc64-256 (~300M), set in
# HF_MODELS["vjepa2"] in mminf/model/registry.py.  To swap to vith / vitg /
# vitg-384, edit that entry — the same code path loads every variant by
# reading its config.json.

node_groups:
  - node_names:
      - video_encoder
    ranks:
      - 0

  # Phase 1 single-pass ``predictor`` and Phase 2 ``rollout_predictor`` share
  # the same underlying VJEPA2Predictor nn.Module (loaded once); colocating
  # them on the same rank keeps that instance reachable without cross-rank
  # tensor shipping.
  - node_names:
      - predictor
      - rollout_predictor
    ranks:
      - 0
