<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 196" fill="none" role="img" aria-label="M* logo">
  <defs>
    <linearGradient id="mstarGrad" gradientUnits="userSpaceOnUse" x1="30" y1="72" x2="352" y2="118">
      <stop offset="0" stop-color="#7b61ff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="mstarGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#7b61ff" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g filter="url(#mstarGlow)">
    <!-- M : a bold monoline letterform -->
    <path d="M40 162 L40 54 L124 142 L208 54 L208 162"
          stroke="url(#mstarGrad)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- star : a 6-spoke graph hub with component nodes radiating out (the Walk Graph) -->
    <g stroke="url(#mstarGrad)" stroke-width="14" stroke-linecap="round">
      <line x1="298" y1="72" x2="340" y2="72"/>
      <line x1="298" y1="72" x2="319" y2="108.4"/>
      <line x1="298" y1="72" x2="277" y2="108.4"/>
      <line x1="298" y1="72" x2="256" y2="72"/>
      <line x1="298" y1="72" x2="277" y2="35.6"/>
      <line x1="298" y1="72" x2="319" y2="35.6"/>
    </g>
    <g fill="url(#mstarGrad)">
      <circle cx="340" cy="72" r="7"/>
      <circle cx="319" cy="108.4" r="7"/>
      <circle cx="277" cy="108.4" r="7"/>
      <circle cx="256" cy="72" r="7"/>
      <circle cx="277" cy="35.6" r="7"/>
      <circle cx="319" cy="35.6" r="7"/>
      <circle cx="298" cy="72" r="9"/>
    </g>
  </g>
</svg>
